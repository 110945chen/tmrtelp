<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進入網站請輸入密碼</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .lock-container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        input[type="password"] {
            padding: 10px;
            font-size: 16px;
            width: 200px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #error-msg {
            color: red;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="lock-container" id="lock-box">
    <h2>🔒 此網站已加密</h2>
    <p>請輸入密碼以觀看內容：</p>
    <input type="password" id="password" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter') checkPassword()">
    <br>
    <button onclick="checkPassword()">確認提交</button>
    <div id="error-msg"></div>
</div>

<script>
function checkPassword() {
    var password = document.getElementById("password").value;
    
    // 💡 請在下方引號內設定您想要的密碼（目前預設為 1234）
    if (password === "TMRT773600") {
        // 💡 密碼正確後，會自動跳轉到您的儀表板網頁
        // 請確保後面的檔名與您儲存庫中的儀表板檔案名稱完全一致
        window.location.href = "電子廠採購案件儀表板_連接試算表版.html";
    } else {
        document.getElementById("error-msg").innerText = "密碼錯誤，請再試一次！";
    }
}
</script>

</body>
</html>
